# Automated dependency vulnerability alerts & update PRs.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: npm
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]

  - package-ecosystem: npm
    directory: "/frontend/breadBank"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
