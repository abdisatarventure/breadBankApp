name: Security scan

# Vulnerability scanning of production assets (application dependencies + source).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, frontend/breadBank]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit production dependencies
        working-directory: ${{ matrix.dir }}
        # Fail the build on high/critical vulnerabilities in runtime deps.
        run: npm audit --omit=dev --audit-level=high

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        env:
          # ghcr.io rate-limits the vuln DB pull; fall back across mirrors.
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Table output + exit code keeps this working on private repos
          # (SARIF upload requires GitHub Advanced Security).
          format: table
          exit-code: "1"
